spring.application.name=notes
server.port=${SERVER_PORT:8088}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/bitnotes}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Root@123}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# Optional: set this to force one fixed admin account.
app.admin.email=${APP_ADMIN_EMAIL:}

# Upload settings
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.upload.max-file-size-bytes=${APP_UPLOAD_MAX_FILE_SIZE_BYTES:10485760}

# Comma-separated frontend origins
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081,http://localhost:5500,http://127.0.0.1:5500}
