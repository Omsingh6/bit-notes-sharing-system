<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIT Notes Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <main class="page auth-page">
        <section class="hero">
            <p class="eyebrow">BIT Campus Hub</p>
            <h1>Register Or Login</h1>
            <p class="subtitle">First register once, then login with your email and password.</p>
        </section>

        <section class="card auth-card">
            <h2>Auth</h2>
            <p class="status">Use Register for first-time account, then use Login.</p>
            <div class="grid one-col">
                <label>Name
                    <input id="loginName" type="text" placeholder="Required only for registration" autocomplete="name">
                </label>
                <label>Email
                    <input id="loginEmail" type="email" placeholder="yourname@example.com" autocomplete="email">
                </label>
                <label>Password
                    <input id="loginPassword" type="password" placeholder="At least 8 characters" autocomplete="current-password">
                </label>
            </div>
            <div class="actions">
                <button class="btn" id="registerBtn" type="button">Register</button>
                <button class="btn primary" id="loginBtn" type="button">Login</button>
            </div>
            <p id="loginStatus" class="status-banner hidden" role="status" aria-live="polite"></p>
        </section>
    </main>

    <script src="login.js"></script>
</body>
</html>
